# gateway-policy — full config reference
#
# Paste the `plugins.gateway-policy:` block into your profile's
# config.yaml (NOT into this file — this file lives inside the plugin
# dir and is reference-only).
#
# All keys are optional; shown with their defaults where applicable.

plugins:
  gateway-policy:
    enabled: true                  # master switch; false = plugin is a no-op

    # -----------------------------------------------------------------
    # listen_only: buffer ambient group messages; collapse on tag.
    # -----------------------------------------------------------------
    listen_only:
      # How long after a tagged reply the bot keeps replying without
      # re-tagging. 0 disables the follow-up window.
      window_seconds: 120

      # If true, bot only replies when explicitly @mentioned or when
      # the follow-up window is open. If false, every message replies.
      require_mention: true

      # Max ambient messages held per chat while waiting for a tag.
      # Older messages are dropped (FIFO).
      buffer_max: 50

      # Prefix prepended to the collapsed buffer when the bot finally
      # replies — helps the LLM distinguish context from the new turn.
      rewrite_header: "Recent chat context:"

      # Chats to apply listen_only to. Each entry is a per-platform
      # chat id. Same chat id across platforms does not conflict —
      # match is (platform, chat_id).
      chats:
        - { platform: whatsapp, chat_id: "120363xxxxxxxxxxxx@g.us" }
        # - { platform: telegram, chat_id: "-1001234567890" }

    # -----------------------------------------------------------------
    # handover: silent-ingest while the owner handles the chat.
    #
    # Activation is agent-driven only — the bot calls the
    # ``trigger_handover`` tool when the conversation needs a human.
    # Gateway-side phrase / LLM classifier triggers were removed
    # (unreliable across languages, redundant with the agent's own
    # judgement). Tell the agent *when* to escalate via your AGENTS.md.
    # -----------------------------------------------------------------
    handover:
      enabled: false               # explicit opt-in

      # Platforms to enable handover on.
      platforms: [whatsapp]

      # Where to notify when a handover activates.
      owner:
        platform: whatsapp
        chat_id: "60123456789@s.whatsapp.net"

      # Auto-expire active handovers after this many minutes.
      # 0 = never expire (owner must /takeback manually).
      timeout_minutes: 60

      # Command the owner sends (from their own account, in the same chat)
      # to end the handover and return control to the bot.
      exit_command: "/takeback"

      # Notification templates. Available placeholders:
      #   {customer_name} {chat_id} {chat_id_encoded} {platform} {reason}
      #   {activated_by}
      #   {customer_phone}  — normalized phone (digits only). For WhatsApp
      #                       this resolves LIDs via the bridge mapping; for
      #                       Telegram it's the numeric user_id; for other
      #                       platforms it's the raw chat_id.
      #   {customer_link}   — clickable platform deep link. WhatsApp →
      #                       https://wa.me/<phone>; Telegram →
      #                       tg://user?id=<id>; otherwise raw chat_id.
      #   {chat_id_encoded} — chat id with ``@``→``_AT_`` and ``.``→``_DOT_``
      #                       so it fits Telegram tappable /commands (omit
      #                       this line from the template if you do not use it).
      #
      # When ``owner.platform`` is ``telegram``, you can add a tappable
      # ``/takeback_{chat_id_encoded}`` line so the owner can re-enable the bot
      # from the Telegram notification. Symmetric ``/handover_{chat_id_encoded}``
      # also works from the owner's Telegram DM with the bot.
      notify_on_activate: |
        Handover: {customer_name} ({platform} {customer_phone})
        Reason: {reason}
        Chat: {customer_link}

        /takeback_{chat_id_encoded} — re-enable bot
      notify_on_exit: "Handover ended for {customer_name}."

      # Register trigger_handover as a tool the agent can call.
      # Guidance for *when* to call belongs in your AGENTS.md.
      tool:
        enabled: true
